<!DOCTYPE html>
<html lang="pl">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Zapomniałeś hasła? - Na Rejonie</title>
    <link rel="stylesheet" href="css/style.css">
    <link rel="icon" type="image/png" href="favicon.png">
    <style>
        .auth-container {
            max-width: 400px;
            margin: 100px auto;
            padding: 2rem;
            background: white;
            border-radius: 8px;
            box-shadow: 0 4px 6px rgba(0,0,0,0.1);
        }
        .auth-container h2 {
            text-align: center;
            margin-bottom: 1.5rem;
            color: #333;
        }
        .back-link {
            display: block;
            text-align: center;
            margin-top: 1rem;
            color: #4a90e2;
            text-decoration: none;
        }
    </style>
</head>
<body>
    <nav class="navbar">
        <div class="nav-container">
            <a href="index.html" class="logo">
                <img src="img/logo.png" alt="Na Rejonie Logo" class="logo-img">
            </a>
        </div>
    </nav>

    <div class="auth-container">
        <h2>Resetowanie hasła</h2>
        <p style="text-align: center; color: #666; margin-bottom: 1.5rem; font-size: 0.9rem;">
            Podaj adres e-mail powiązany z Twoim kontem. Prześlemy Ci link do zresetowania hasła.
        </p>
        <form id="forgotPasswordForm">
            <div class="form-group">
                <label for="email">Email</label>
                <input type="email" id="email" required>
            </div>
            <button type="submit" class="btn btn-primary" style="width: 100%;">Wyślij link</button>
        </form>
        <a href="index.html" class="back-link">Wróć do strony głównej</a>
    </div>

    <div id="toastContainer"></div>

    <script src="js/api.js"></script>
    <script>
    document.getElementById('forgotPasswordForm').addEventListener('submit', async (e) => {
        e.preventDefault();
        const email = document.getElementById('email').value;
        const submitBtn = e.target.querySelector('button[type="submit"]');

        // Blokujemy przycisk na starcie
        submitBtn.disabled = true;
        submitBtn.textContent = 'Wysyłanie...';

        try {
            // Używamy gotowej funkcji z api.js
            const data = await requestPasswordReset(email);
            
            // 1. Pokazujemy sukces
            showToast(data.detail || 'Link został wysłany!', 'success');

            // 2. AUTOMATYCZNE PRZEKIEROWANIE
            // Czekamy 2 sekundy, żeby użytkownik zdążył przeczytać Toast, i wracamy do logowania
            setTimeout(() => {
                window.location.href = 'index.html';
            }, 2000);

        } catch (error) {
            // Obsługa błędu
            showToast(error.message || 'Wystąpił błąd', 'error');
            
            // Odblokowujemy przycisk tylko przy błędzie, żeby użytkownik mógł spróbować jeszcze raz
            submitBtn.disabled = false;
            submitBtn.textContent = 'Wyślij link';
        }
        // Uwaga: Jeśli chcesz, żeby przycisk odblokował się też po sukcesie (mimo przekierowania),
        // możesz dodać blok finally { submitBtn.disabled = false; ... }
    });

    function showToast(message, type = 'info') {
        const container = document.getElementById('toastContainer');
        if (!container) {
            // Failsafe: jeśli nie ma kontenera, użyj zwykłego alertu
            alert(message);
            return;
        }

        const toast = document.createElement('div');
        toast.className = `toast toast-${type}`;
        toast.textContent = message;

        container.appendChild(toast);

        setTimeout(() => {
            toast.classList.add('fade-out');
            setTimeout(() => toast.remove(), 300);
        }, 3000);
    }
</script>
</body>
</html>
