<!DOCTYPE html>
<html lang="pl">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Zmień hasło - Na Rejonie</title>
    <link rel="stylesheet" href="css/style.css">
    <link rel="icon" type="image/png" href="favicon.png">
    <style>
        .auth-container {
            max-width: 400px;
            margin: 100px auto;
            padding: 2rem;
            background: white;
            border-radius: 8px;
            box-shadow: 0 4px 6px rgba(0,0,0,0.1);
        }
        .auth-container h2 {
            text-align: center;
            margin-bottom: 1.5rem;
            color: #333;
        }
        .back-link {
            display: block;
            text-align: center;
            margin-top: 1rem;
            color: #4a90e2;
            text-decoration: none;
        }
        .invalid-link {
            display: none;
            text-align: center;
            color: #e74c3c;
            padding: 20px;
        }
    </style>
</head>
<body>
    <nav class="navbar">
        <div class="nav-container">
            <a href="index.html" class="logo">
                <img src="img/logo.png" alt="Na Rejonie Logo" class="logo-img">
            </a>
        </div>
    </nav>

    <div class="auth-container" id="formContainer">
        <h2>Ustaw nowe hasło</h2>
        <form id="resetPasswordForm">
            <div class="form-group">
                <label for="password">Nowe hasło</label>
                <input type="password" id="password" required minlength="8">
            </div>
            <div class="form-group">
                <label for="passwordConfirm">Potwierdź nowe hasło</label>
                <input type="password" id="passwordConfirm" required minlength="8">
            </div>
            <button type="submit" class="btn btn-primary" style="width: 100%;">Zmień hasło</button>
        </form>
    </div>

    <div class="auth-container invalid-link" id="invalidLinkContainer">
        <h2>Błąd</h2>
        <p>Link do resetowania hasła jest nieprawidłowy lub wygasł.</p>
        <a href="forgot-password.html" class="btn btn-primary" style="display: inline-block; margin-top: 15px;">Wyślij link ponownie</a>
        <a href="index.html" class="back-link">Wróć do strony głównej</a>
    </div>

    <div id="toastContainer"></div>

    <script src="js/api.js"></script>
    <script>
    // Konfiguracja adresu API - upewnij się, że pasuje do Twojego serwera Django
    // Jeśli api.js jest poprawnie wczytane, możemy spróbować użyć API_BASE_URL, 
    // ale dla pewności przy resetowaniu hasła zdefiniujmy to jasno:
    const ACTUAL_API_URL = "http://127.0.0.1:8000"; 

    const urlParams = new URLSearchParams(window.location.search);
    const uid = urlParams.get('uid');
    const token = urlParams.get('token');

    // Sprawdzenie czy link zawiera wymagane dane
    if (!uid || !token) {
        document.getElementById('formContainer').style.display = 'none';
        document.getElementById('invalidLinkContainer').style.display = 'block';
    }

    document.getElementById('resetPasswordForm').addEventListener('submit', async (e) => {
        e.preventDefault();
        const password = document.getElementById('password').value;
        const passwordConfirm = document.getElementById('passwordConfirm').value;
        const submitBtn = e.target.querySelector('button[type="submit"]');

        if (password !== passwordConfirm) {
            showToast('Hasła nie są identyczne', 'error');
            return;
        }

        submitBtn.disabled = true;
        submitBtn.textContent = 'Zmienianie...';

        try {
            // Zmieniono API_URL na ACTUAL_API_URL i dopasowano ścieżkę do Twojego urls.py
           const response = await fetch(`http://127.0.0.1:8000/api/auth/password-reset-confirm/`, {
    method: 'POST',
    headers: {
        'Content-Type': 'application/json'
    },
    body: JSON.stringify({
        uid: uid,
        token: token,
        password: password
    })
});

            const data = await response.json();
            
            if (response.ok) {
                showToast(data.detail || 'Hasło zostało pomyślnie zmienione.', 'success');
                setTimeout(() => {
                    window.location.href = 'index.html';
                }, 3000);
            } else {
                // Obsługa błędów walidacji z Django (np. za krótkie hasło)
                const errorMsg = data.detail || (data.password ? `Hasło: ${data.password[0]}` : 'Wystąpił błąd');
                showToast(errorMsg, 'error');
                submitBtn.disabled = false;
                submitBtn.textContent = 'Zmień hasło';
            }
        } catch (error) {
            console.error('Błąd zmiany hasła:', error);
            showToast('Błąd połączenia z serwerem (CORS lub serwer wyłączony).', 'error');
            submitBtn.disabled = false;
            submitBtn.textContent = 'Zmień hasło';
        }
    });

    function showToast(message, type = 'info') {
        const container = document.getElementById('toastContainer');
        if (!container) return;

        const toast = document.createElement('div');
        toast.className = `toast toast-${type}`;
        toast.textContent = message;

        container.appendChild(toast);

        setTimeout(() => {
            toast.classList.add('fade-out');
            setTimeout(() => toast.remove(), 300);
        }, 3000);
    }
</script>
</body>
</html>
